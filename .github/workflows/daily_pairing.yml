name: Daily SUUMO Property Pairing

on:
  schedule:
    - cron: "0 21 * * *"   # 06:00 JST (UTC+9)
  workflow_dispatch:
    inputs:
      pair:
        description: 'Area pair e.g. "港区-世田谷区" (leave blank for auto-rotate)'
        required: false
      tier:
        description: "Single tier: 入門層 / 中端層 / 高端層 (leave blank for all)"
        required: false

jobs:
  pairing:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r suumo_pairing/requirements.txt

      - name: Run pairing
        run: |
          ARGS="--auto-rotate"
          if [ -n "${{ github.event.inputs.pair }}" ]; then
            ARGS="--pair \"${{ github.event.inputs.pair }}\""
          fi
          if [ -n "${{ github.event.inputs.tier }}" ]; then
            ARGS="$ARGS --tier \"${{ github.event.inputs.tier }}\""
          fi
          eval python -m suumo_pairing.main $ARGS

      - name: Generate email body
        run: |
          python - <<'EOF'
          import glob, json, os
          from suumo_pairing.output import format_email_html
          from suumo_pairing.models import DailyResult, PropertyPair, Property

          # Load the most recent output JSON
          files = sorted(glob.glob("suumo_pairing/output/pairs_*.json"))
          if not files:
              print("No output file found"); exit(1)

          with open(files[-1], encoding="utf-8") as f:
              data = json.load(f)

          # Re-hydrate into model objects so format_email_html works
          pairs = []
          for p in data.get("pairs", []):
              def prop(d, area):
                  import re
                  nc = re.search(r"/nc_(\d+)/", d["url"])
                  return Property(
                      nc_id=nc.group(1) if nc else "",
                      name=d["name"], price_jpy=d["price_jpy"],
                      room_type=d["room_type"], area_sqm=d["area_sqm"],
                      url=d["url"], area_name=area,
                  )
              area_a, area_b = data["area_pair_used"].split("-", 1)
              pair = PropertyPair(
                  property_a=prop(p["property_a"], area_a),
                  property_b=prop(p["property_b"], area_b),
                  tier=p.get("tier", ""),
              )
              pairs.append(pair)

          result = DailyResult(
              run_date=data["run_date"],
              area_pair_used=data["area_pair_used"],
              new_pairs_found=data["new_pairs_found"],
              target_range=data.get("target_range", "8-10"),
              warnings=data.get("warnings", []),
              pairs=pairs,
          )

          html = format_email_html(result)
          with open("email_body.html", "w", encoding="utf-8") as f:
              f.write(html)
          print("Email body written.")
          EOF

      - name: Send email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python - <<'EOF'
          import json, os, sys, urllib.request, urllib.error

          api_key = os.environ.get("RESEND_API_KEY", "")
          if not api_key:
              print("RESEND_API_KEY not set — skipping email"); sys.exit(0)

          with open("email_body.html", encoding="utf-8") as f:
              html = f.read()

          payload = json.dumps({
              "from":    "AiSumai 配對報告 <onboarding@resend.dev>",
              "to":      ["jasperwu314@gmail.com"],
              "subject": "🏠 AiSumai 每日配對報告",
              "html":    html,
          }).encode()

          req = urllib.request.Request(
              "https://api.resend.com/emails",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type":  "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print("Email sent:", resp.read().decode())
          except urllib.error.HTTPError as e:
              print("Send failed:", e.code, e.read().decode())
              sys.exit(1)
          EOF

      - name: Upload JSON results
        uses: actions/upload-artifact@v4
        with:
          name: pairing-${{ github.run_id }}
          path: suumo_pairing/output/
          retention-days: 90

      - name: Commit updated dedup DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add suumo_pairing/seen_pairs.db
          git diff --staged --quiet || git commit -m "chore: update seen_pairs.db [skip ci]"
          git push
